services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: link_shortener_app
    restart: unless-stopped
    environment:
      # ":8080" -> HTTP only, Caddy auto-TLS disabled (no local certificates)
      SERVER_NAME: ":8080"
      # Set APP_SEED=true to auto-run the demo seeder on first start
      APP_SEED: ${APP_SEED:-false}
    ports:
      - "8080:8080"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: link_shortener_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: link_shortener
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel -d link_shortener"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
