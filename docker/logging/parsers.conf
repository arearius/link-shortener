[PARSER]
    Name        json
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z

# Joins continuation lines (e.g. PHP/Go stack-trace frames) onto the preceding
# log line. A new record starts when a line begins with '{' (Laravel/Caddy JSON),
# '[' (bootstrap output) or a date (Postgres). Anything else is a continuation.
[MULTILINE_PARSER]
    Name         mixed_multiline
    Type         regex
    Flush        2
    Rule         "start_state"  "/^(\{|\[|\d{4}-\d{2}-\d{2})/"        "cont"
    Rule         "cont"         "/^(?!(\{|\[|\d{4}-\d{2}-\d{2})).+/"  "cont"
