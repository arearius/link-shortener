[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

# Receives container stdout/stderr via Docker's fluentd logging driver.
[INPUT]
    Name         forward
    Listen       0.0.0.0
    Port         24224

# Try to parse the container line as JSON (Laravel/Caddy emit JSON);
# plain lines are passed through unchanged.
[FILTER]
    Name         parser
    Match        *
    Key_Name     log
    Parser       json
    Reserve_Data On

# Ship everything to Loki, labelled by container and stream.
[OUTPUT]
    Name         loki
    Match        *
    Host         loki
    Port         3100
    Labels       job=docker
    Label_Keys   $container_name,$source
    Line_Format  json
    Remove_Keys  container_id,container_name,source
